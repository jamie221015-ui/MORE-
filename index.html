const PetSVG = ({ type, mood }) => {
  const src = PET_IMAGES[type];
  const filters = {
    sad: "grayscale(40%) brightness(0.85)",
    happy: "brightness(1.08) saturate(1.2)",
    idle: "none",
  };
  return (
    <div style={{ position: "relative", width: "100%", height: "100%" }}>
      <img src={src} alt={type} style={{
        width: "100%", height: "100%", objectFit: "contain",
        filter: filters[mood] || "none",
        transition: "filter 0.3s"
      }}/>
      {mood === "sad" && (
        <div style={{ position: "absolute", top: 0, right: 0, fontSize: 22 }}>😢</div>
      )}
      {mood === "happy" && (
        <div style={{ position: "absolute", top: 0, right: 0, fontSize: 22 }}>✨</div>
      )}
    </div>
  );
};

];

const SHOP_ITEMS = [
  { id: "food",    name: "飼料",   icon: "🍖", cost: 10,  effect: { hungry: 30 },           desc: "+飽食30" },
  { id: "snack",   name: "零食",   icon: "🍬", cost: 20,  effect: { hungry: 20, mood: 20 }, desc: "+飽食20 +心情20" },

// ── 寵物小遊戲 ──
function PetTab({ coins }) {
  const [pet, setPet] = useState(() => {
    try {
      const s = localStorage.getItem(LS_PET);
      return s ? JSON.parse(s) : null;
    } catch { return null; }
  });
  const [msg, setMsg] = useState("");
  const [confirmReset, setConfirmReset] = useState(false);
  const [choosing, setChoosing] = useState(!pet);
  const [showShop, setShowShop] = useState(false);

  const savePet = (p) => {
    setPet(p);
    try { localStorage.setItem(LS_PET, JSON.stringify(p)); } catch {}
  };

  const showMsg = (m) => { setMsg(m); setTimeout(() => setMsg(""), 2000); };

  const choosePet = (petDef) => {
    const newPet = { type: petDef.id, name: petDef.name, title: petDef.title, color: petDef.color, level: 1, exp: 0, hungry: 80, mood: 80, clean: 80, spent: 0 };
    savePet(newPet);
    setChoosing(false);
    showMsg(`${petDef.name} 加入 MORE 家族！🎉`);
  };

  const buyItem = (item) => {
    if (!pet) return;
    const available = coins - (pet.spent || 0);
    if (available < item.cost) { showMsg("硬幣不夠！多多進貨賺幣 💰"); return; }
    const updated = {
      ...pet,
      spent: (pet.spent || 0) + item.cost,
      hungry: Math.min(100, pet.hungry + (item.effect.hungry || 0)),
      mood: Math.min(100, pet.mood + (item.effect.mood || 0)),
      clean: Math.min(100, pet.clean + (item.effect.clean || 0)),
      exp: (pet.exp || 0) + item.cost,
    };
    // 升級
    const newLevel = Math.floor(updated.exp / 100) + 1;
    if (newLevel > (pet.level || 1)) {
      updated.level = newLevel;
      showMsg(`🎊 升級了！等級 ${newLevel}`);
    } else {
      showMsg(`${item.icon} ${item.name} 購買成功！`);
    }
    savePet(updated);
    setShowShop(false);
  };

  // 可用硬幣
  const availableCoins = Math.max(0, coins - (pet?.spent || 0));

  const petDef = pet ? PETS.find(p => p.id === pet.type) : null;

  // 寵物狀態表情
  const getPetMood = () => {
    if (!pet) return "idle";
    if (pet.hungry < 20 || pet.mood < 20) return "sad";
    if (pet.mood > 70 && pet.hungry > 70) return "happy";
    return "idle";
  };

  const StatBar = ({ label, value, color }) => (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: "#A59482" }}>{label}</span>
        <span style={{ fontSize: 12, color: "#A59482", fontFamily: "monospace" }}>{Math.round(value)}/100</span>
      </div>
      <div style={{ height: 8, background: "#ede0d4", borderRadius: 4, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${value}%`, background: color, borderRadius: 4, transition: "width 0.4s" }} />
      </div>
    </div>
  );

  if (choosing) return (
    <div>
      <Card style={{ textAlign: "center", padding: 24 }}>
        <div style={{ fontSize: 24, fontWeight: 700, color: "#A59482", marginBottom: 8 }}>選擇你的寵物 🐾</div>
        <div style={{ fontSize: 13, color: "#C4B1A0", marginBottom: 20 }}>每次進貨和銷售都會賺到硬幣，用來養牠！</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {PETS.map(p => (
            <button key={p.id} onClick={() => choosePet(p)} style={{ padding: "12px 16px", borderRadius: 18, border: `2px solid #9a7050`, background: "#faf6f2", cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ width: 90, height: 90, flexShrink: 0, borderRadius: 12, overflow: "hidden", background: "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <PetSVG type={p.id} mood="happy" />
              </div>
              <div style={{ textAlign: "left" }}>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#7a4a28" }}>{p.name}</div>
                <div style={{ fontSize: 12, color: "#C4B1A0", marginTop: 3 }}>{p.title}</div>
              </div>
            </button>
          ))}
        </div>
      </Card>
    </div>
  );

  if (!pet) return null;

  return (
    <div>
      {msg && (
        <div style={{ position: "fixed", top: "50%", left: "50%", transform: "translate(-50%,-50%)", background: "rgba(0,0,0,0.75)", color: "#fff", padding: "14px 24px", borderRadius: 20, fontSize: 16, fontWeight: 700, zIndex: 200, textAlign: "center" }}>
          {msg}
        </div>
      )}

      {showShop && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 100, display: "flex", alignItems: "flex-end" }}>
          <div style={{ background: "#fff", borderRadius: "20px 20px 0 0", padding: 20, width: "100%", boxSizing: "border-box" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 17, fontWeight: 700, color: "#A59482" }}>🛒 寵物商店</div>
              <div style={{ fontSize: 14, color: "#C6A992", fontWeight: 700 }}>💰 {availableCoins} 幣</div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, maxHeight: 320, overflowY: "auto" }}>
              {SHOP_ITEMS.map(item => (
                <button key={item.id} onClick={() => buyItem(item)} disabled={availableCoins < item.cost}
                  style={{ padding: "12px 10px", borderRadius: 12, border: "1.5px solid #DBC8B6", background: availableCoins < item.cost ? "#f5f0eb" : "#faf6f2", cursor: availableCoins < item.cost ? "default" : "pointer", opacity: availableCoins < item.cost ? 0.5 : 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                  <span style={{ fontSize: 32 }}>{item.icon}</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: "#A59482" }}>{item.name}</span>
                  <span style={{ fontSize: 11, color: "#C4B1A0" }}>{item.desc}</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: "#9A6852" }}>💰 {item.cost}</span>
                </button>
              ))}
            </div>
            <button onClick={() => setShowShop(false)} style={{ marginTop: 12, width: "100%", padding: 12, borderRadius: 12, border: "1px solid #DBC8B6", background: "#fff", color: "#A59482", cursor: "pointer", fontSize: 14 }}>關閉</button>
          </div>
        </div>
      )}

      {/* 硬幣 & 等級 */}
      <Card style={{ background: "linear-gradient(135deg,#7a6352,#9A6852)", padding: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ color: "#DBC8B6", fontSize: 11, fontWeight: 700, marginBottom: 4 }}>我的硬幣</div>
            <div style={{ color: "#fff", fontSize: 24, fontWeight: 700 }}>💰 {availableCoins}</div>
            <div style={{ color: "#DBC8B6", fontSize: 11, marginTop: 2 }}>進貨/銷售賺幣 · 買道具花幣</div>
          </div>
          <div style={{ textAlign: "center" }}>

const Card = ({ children, style = {} }) => (
  <div style={{ background: "#fff", borderRadius: 16, padding: 16, marginBottom: 14, boxShadow: "0 1px 10px rgba(139,90,43,0.09)", ...style }}>{children}</div>
);
const Label = ({ children }) => (
  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", color: "#A59482", textTransform: "uppercase", marginBottom: 6 }}>{children}</div>
);
const NumInput = ({ value, onChange, placeholder = "0" }) => (
  <input type="number" min="0" value={value} placeholder={placeholder}
    onChange={e => onChange(e.target.value === "" ? "" : Number(e.target.value))}
    style={{ width: "100%", border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "9px 10px", fontSize: 16, fontFamily: "monospace", background: "#faf6f2", color: "#A59482", outline: "none", boxSizing: "border-box" }} />
);

const DateInput = ({ value, onChange }) => {
  // Convert display format (2026/4/16) to input format (2026-04-16)
  const toInputVal = (v) => {
    if (!v) return "";
    const parts = v.replace(/\//g, "-").split("-");
    if (parts.length !== 3) return "";
    return `${parts[0]}-${parts[1].padStart(2,"0")}-${parts[2].padStart(2,"0")}`;
  };
  // Convert input format back to display format
  const toDisplay = (v) => {
    if (!v) return "";
    const parts = v.split("-");
    if (parts.length !== 3) return "";
    return `${parts[0]}/${parseInt(parts[1])}/${parseInt(parts[2])}`;
  };
  return (
    <input type="date" value={toInputVal(value)}
      onChange={e => onChange(toDisplay(e.target.value))}
      style={{ width: "100%", border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "9px 10px",
        fontSize: 15, background: "#faf6f2", color: value ? "#3d2b1f" : "#C4B1A0",
        outline: "none", boxSizing: "border-box", WebkitAppearance: "none" }} />
  );
};

const TextInput = ({ value, onChange, placeholder }) => (
  <input type="text" value={value} placeholder={placeholder} onChange={e => onChange(e.target.value)}
    style={{ width: "100%", border: "1.5px solid #DBC8B6", borderRadius: 8, padding: "9px 10px", fontSize: 15, background: "#faf6f2", color: "#A59482", outline: "none", boxSizing: "border-box" }} />
);

function SalesTab({ onSave, customers }) {
  const [items, setItems] = useState([]);
  const [shipping, setShipping] = useState("");
  const [showPicker, setShowPicker] = useState(false);
  const [showSave, setShowSave] = useState(false);
  const [priceType, setPriceType] = useState(2);
  const [flash, setFlash] = useState(false);

  const addItem = (p) => { setItems(prev => [...prev, { ...p, qty: 1, type: priceType }]); setShowPicker(false); };
  const updateItem = (name, field, val) => setItems(prev => prev.map(i => i.name === name ? { ...i, [field]: val } : i));
  const removeItem = (name) => setItems(prev => prev.filter(i => i.name !== name));
  const totalRevenue = items.reduce((s, i) => s + i.prices[i.type] * (i.qty || 0), 0);
  const totalCost = items.reduce((s, i) => s + i.cost * (i.qty || 0), 0);
  const ship = Number(shipping) || 0;
  const netProfit = totalRevenue - totalCost - ship;
  const margin = totalRevenue > 0 ? (netProfit / totalRevenue * 100) : 0;

  const handleSave = (customer, note, customerId) => {
    const record = { id: nowId(), date: today(), type: "sale", customer, note, customerId, items: items.map(i => ({ name: i.name, qty: i.qty, priceLabel: PRICE_LABELS[i.type], unitPrice: i.prices[i.type], unitCost: i.cost })), totalRevenue, totalCost, shipping: ship, netProfit, margin: margin.toFixed(1) };
    onSave(record);
    setShowSave(false);
    setFlash(true);
    setTimeout(() => { setFlash(false); setItems([]); setShipping(""); }, 1800);
  };

  if (flash) return <SuccessFlash />;
  return (
    <div>
      {showSave && <SaveModal isSale profit={netProfit} customers={customers} onSave={handleSave} onCancel={() => setShowSave(false)} />}
      <Card>
        <Label>售價類型</Label>
        <div style={{ display: "flex", gap: 8 }}>
          {PRICE_LABELS.map((l, i) => <button key={i} onClick={() => setPriceType(i)} style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "none", cursor: "pointer", background: priceType === i ? "#C6A992" : "#ede0d4", color: priceType === i ? "#fff" : "#A59482", fontWeight: 600, fontSize: 13 }}>{l}</button>)}
        </div>
      </Card>
      <Card>
        <Label>新增商品</Label>
        {showPicker ? <ProductPicker items={items} onAdd={addItem} onClose={() => setShowPicker(false)} />
          : <button onClick={() => setShowPicker(true)} style={{ width: "100%", padding: 11, borderRadius: 10, border: "2px dashed #D3BBA8", background: "#faf6f2", color: "#A59482", cursor: "pointer", fontSize: 15, fontWeight: 600 }}>＋ 選擇商品</button>}
      </Card>
      {items.map(item => (
        <Card key={item.name} style={{ padding: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontWeight: 700, fontSize: 15, color: "#A59482" }}>{item.name}</span>
            <button onClick={() => removeItem(item.name)} style={{ border: "none", background: "none", color: "#c0392b", fontSize: 18, cursor: "pointer", padding: 0 }}>✕</button>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
            {PRICE_LABELS.map((l, i) => <button key={i} onClick={() => updateItem(item.name, "type", i)} style={{ flex: 1, padding: "6px 0", borderRadius: 7, border: "none", cursor: "pointer", fontSize: 11, background: item.type === i ? "#C6A992" : "#ede0d4", color: item.type === i ? "#fff" : "#A59482", fontWeight: 600 }}>{l}<br /><span style={{ fontSize: 11 }}>{ntd(item.prices[i])}</span></button>)}
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <div style={{ flex: 1 }}><Label>數量</Label><NumInput value={item.qty} onChange={v => updateItem(item.name, "qty", v)} /></div>
            <div style={{ flex: 2, background: "#f7f2ee", borderRadius: 8, padding: "8px 12px" }}>
              <div style={{ fontSize: 11, color: "#A59482" }}>小計</div>
              <div style={{ fontSize: 17, fontFamily: "monospace", fontWeight: 700, color: "#A59482" }}>{ntd(item.prices[item.type] * (item.qty || 0))}</div>
              <div style={{ fontSize: 11, color: "#C4B1A0" }}>利潤 {ntd((item.prices[item.type] - item.cost) * (item.qty || 0))}</div>
            </div>
          </div>
        </Card>
      ))}
      {items.length > 0 && <Card><Label>運費 / 手續費</Label><NumInput value={shipping} onChange={setShipping} placeholder="選填" /></Card>}
      {items.length > 0 && (
        <Card style={{ background: "linear-gradient(135deg,#A59482,#C6A992)", padding: 18 }}>
          <div style={{ color: "#DBC8B6", fontSize: 12, fontWeight: 700, letterSpacing: "0.1em", marginBottom: 12 }}>📊 本單結算</div>
          <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 10, padding: 12, marginBottom: 8 }}>
            {[["總營業額", ntd(totalRevenue)], ["總進貨成本", ntd(totalCost)], ...(ship > 0 ? [["運費/手續費", ntd(ship)]] : [])].map(([l, v]) => (
              <div key={l} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}><span style={{ color: "#DBC8B6", fontSize: 13 }}>{l}</span><span style={{ color: "#fff", fontFamily: "monospace", fontSize: 13 }}>{v}</span></div>
            ))}
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: netProfit < 0 ? "rgba(192,57,43,0.25)" : "rgba(154,104,82,0.35)", borderRadius: 10, padding: "12px 14px" }}>
            <span style={{ color: netProfit < 0 ? "#f5a89e" : "#f5e6de", fontSize: 14, fontWeight: 700 }}>淨利潤</span>
            <span style={{ color: netProfit < 0 ? "#ff8070" : "#f5e6de", fontFamily: "monospace", fontSize: 22, fontWeight: 700 }}>{ntd(netProfit)}</span>
          </div>
          <div style={{ textAlign: "center", color: "#DBC8B6", fontSize: 13, margin: "8px 0 16px" }}>利潤率 {margin.toFixed(1)}%</div>
          <button onClick={() => setShowSave(true)} style={{ width: "100%", padding: 14, borderRadius: 12, border: "2px solid rgba(201,168,128,0.5)", background: "rgba(255,255,255,0.12)", color: "#fff", cursor: "pointer", fontSize: 16, fontWeight: 700 }}>💾 儲存這筆紀錄</button>
        </Card>
      )}
      {items.length === 0 && <div style={{ textAlign: "center", color: "#C4B1A0", padding: "40px 0", fontSize: 14 }}>☝️ 點上方「選擇商品」開始記錄</div>}
    </div>
  );
}

      {items.length > 0 && (

          <Card><Label>其他費用</Label><NumInput value={otherCost} onChange={setOtherCost} placeholder="選填" /></Card>
          <Card style={{ background: "linear-gradient(135deg,#A59482,#C6A992)", padding: 18 }}>
            <div style={{ color: "#DBC8B6", fontSize: 12, fontWeight: 700, marginBottom: 12 }}>📦 進貨成本總計</div>
            <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 10, padding: 12, marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}><span style={{ color: "#DBC8B6", fontSize: 13 }}>商品進貨金額</span><span style={{ color: "#fff", fontFamily: "monospace", fontSize: 13 }}>{ntd(totalStock)}</span></div>
              {other > 0 && <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#DBC8B6", fontSize: 13 }}>其他費用</span><span style={{ color: "#fff", fontFamily: "monospace", fontSize: 13 }}>{ntd(other)}</span></div>}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(255,255,255,0.12)", borderRadius: 10, padding: "12px 14px", marginBottom: 16 }}>
              <span style={{ color: "#DBC8B6", fontSize: 14, fontWeight: 700 }}>總進貨成本</span>
              <span style={{ color: "#fff", fontFamily: "monospace", fontSize: 22, fontWeight: 700 }}>{ntd(totalCost)}</span>
            </div>
            <button onClick={() => setShowSave(true)} style={{ width: "100%", padding: 14, borderRadius: 12, border: "2px solid rgba(201,168,128,0.5)", background: "rgba(255,255,255,0.12)", color: "#fff", cursor: "pointer", fontSize: 16, fontWeight: 700 }}>💾 儲存這筆進貨</button>
          </Card>
        </>
      )}
      {items.length === 0 && <div style={{ textAlign: "center", color: "#C4B1A0", padding: "40px 0", fontSize: 14 }}>☝️ 點上方「選擇進貨商品」開始記錄</div>}
    </div>
  );
}

function RecordCard({ r, expanded, setExpanded, setDeleting }) {

      <div onClick={() => setExpanded(expanded === r.id ? null : r.id)} style={{ padding: "14px 16px", cursor: "pointer" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 20, background: r.type === "sale" ? "#e8f5ec" : "#fef3e8", color: r.type === "sale" ? "#1a6b3a" : "#c17d2a", whiteSpace: "nowrap" }}>{r.type === "sale" ? "銷售" : "進貨"}</span>
              <span style={{ fontSize: 12, color: "#C4B1A0" }}>{r.date}</span>

          </div>
          <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 10 }}>
            <div style={{ fontSize: 16, fontFamily: "monospace", fontWeight: 700, color: r.type === "sale" ? (r.netProfit >= 0 ? "#1a6b3a" : "#c0392b") : "#A59482" }}>{r.type === "sale" ? ntd(r.netProfit) : ntd(r.totalCost)}</div>

      </div>
      {expanded === r.id && (
        <div style={{ borderTop: "1px solid #ede0d4", padding: "12px 16px", background: "#f7f2ee" }}>

            <div key={i.name} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
              <span style={{ fontSize: 13, color: "#5a4030" }}>{i.name} × {i.qty}</span>
              <span style={{ fontSize: 13, fontFamily: "monospace", color: "#A59482" }}>{r.type === "sale" ? `${i.priceLabel} ${ntd(i.unitPrice * i.qty)}` : ntd(i.unitCost * i.qty)}</span>
            </div>
          ))}
          {r.type === "sale" && r.shipping > 0 && <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}><span style={{ fontSize: 13, color: "#5a4030" }}>運費/手續費</span><span style={{ fontSize: 13, fontFamily: "monospace", color: "#A59482" }}>{ntd(r.shipping)}</span></div>}
          <div style={{ height: 1, background: "#DBC8B6", margin: "10px 0" }} />
          {r.type === "sale" && <div style={{ fontSize: 12, color: "#A59482", fontFamily: "monospace", lineHeight: 1.8 }}>營業額 {ntd(r.totalRevenue)}<br />成本 {ntd(r.totalCost)}<br /><span style={{ color: r.netProfit >= 0 ? "#1a6b3a" : "#c0392b", fontWeight: 700 }}>淨利 {ntd(r.netProfit)}</span></div>}
          <button onClick={() => setDeleting(r.id)} style={{ marginTop: 12, width: "100%", padding: 10, borderRadius: 10, border: "1px solid #f5bdb5", background: "#fff5f4", color: "#c0392b", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>🗑 刪除</button>
        </div>
      )}
    </Card>
  );
}

function HistoryTab({ records, onDelete, exportData, importData }) {
  const [filter, setFilter] = useState("all");
  const [expanded, setExpanded] = useState(null);
  const [deleting, setDeleting] = useState(null);
  const [selectedYear, setSelectedYear] = useState("all");
  const [selectedMonth, setSelectedMonth] = useState("all");
  const [collapsedMonths, setCollapsedMonths] = useState({});

  const totalSales = records.filter(r => r.type === "sale").reduce((s, r) => s + r.netProfit, 0);
  const totalStock = records.filter(r => r.type === "stock").reduce((s, r) => s + r.totalCost, 0);

  // 從 date 字串取得年月，格式 "4/16（四）" → 用 id (timestamp) 判斷年份
  const getYearMonth = (r) => {
    const d = new Date(Number(r.id));
    return { year: d.getFullYear(), month: d.getMonth() + 1 };
  };

  // 取得所有年份
  const years = [...new Set(records.map(r => getYearMonth(r).year))].sort((a, b) => b - a);

  // 篩選
  const filtered = records.filter(r => {
    const { year, month } = getYearMonth(r);
    if (filter !== "all" && r.type !== filter) return false;
    if (selectedYear !== "all" && year !== Number(selectedYear)) return false;
    if (selectedMonth !== "all" && month !== Number(selectedMonth)) return false;
    return true;
  });

  // 按年月分組
  const grouped = {};
  filtered.forEach(r => {
    const { year, month } = getYearMonth(r);
    const key = `${year}-${String(month).padStart(2, "0")}`;
    if (!grouped[key]) grouped[key] = { year, month, records: [] };
    grouped[key].records.push(r);
  });
  const groupKeys = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

  const toggleMonth = (key) => setCollapsedMonths(prev => ({ ...prev, [key]: !prev[key] }));

  const MONTHS = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];

  return (
    <div>
      {deleting && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#fff", borderRadius: 20, padding: 24, width: "100%", maxWidth: 340, boxSizing: "border-box" }}>
            <div style={{ fontSize: 17, fontWeight: 700, color: "#A59482", marginBottom: 8 }}>確定要刪除？</div>
            <div style={{ fontSize: 13, color: "#A59482", marginBottom: 20 }}>刪除後無法復原</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setDeleting(null)} style={{ flex: 1, padding: 12, borderRadius: 12, border: "1.5px solid #DBC8B6", background: "#fff", color: "#A59482", cursor: "pointer", fontSize: 14 }}>取消</button>
              <button onClick={() => { onDelete(deleting); setDeleting(null); setExpanded(null); }} style={{ flex: 1, padding: 12, borderRadius: 12, border: "none", background: "#c0392b", color: "#fff", cursor: "pointer", fontSize: 14, fontWeight: 700 }}>刪除</button>
            </div>
          </div>
        </div>
      )}

      {/* 備份 */}
      <Card>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", color: "#A59482", textTransform: "uppercase", marginBottom: 12 }}>資料備份</div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={exportData} disabled={records.length === 0} style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "none", background: records.length === 0 ? "#DBC8B6" : "linear-gradient(135deg,#A59482,#C6A992)", color: records.length === 0 ? "#C4B1A0" : "#fff", cursor: records.length === 0 ? "default" : "pointer", fontSize: 14, fontWeight: 600 }}>📤 匯出備份</button>
          <label style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "1.5px solid #DBC8B6", background: "#faf6f2", color: "#C6A992", cursor: "pointer", fontSize: 14, fontWeight: 600, textAlign: "center", display: "block" }}>📥 匯入備份<input type="file" accept=".json" onChange={importData} style={{ display: "none" }} /></label>
        </div>
      </Card>

      {/* 累計統計 */}
      {records.length > 0 && (
        <Card style={{ background: "linear-gradient(135deg,#A59482,#C6A992)", padding: 16 }}>
          <div style={{ color: "#DBC8B6", fontSize: 11, fontWeight: 700, marginBottom: 10 }}>全部累計</div>
          <div style={{ display: "flex", gap: 10 }}>
            <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px" }}>
              <div style={{ color: "#DBC8B6", fontSize: 11, marginBottom: 4 }}>累計淨利潤</div>
              <div style={{ color: totalSales >= 0 ? "#7de8a8" : "#ff8070", fontFamily: "monospace", fontSize: 17, fontWeight: 700 }}>{ntd(totalSales)}</div>
            </div>
            <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px" }}>
              <div style={{ color: "#DBC8B6", fontSize: 11, marginBottom: 4 }}>累計進貨成本</div>
              <div style={{ color: "#fff", fontFamily: "monospace", fontSize: 17, fontWeight: 700 }}>{ntd(totalStock)}</div>
            </div>
          </div>
        </Card>
      )}

      {/* 篩選：類型 */}
      <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
        {[["all", "全部"], ["sale", "銷售"], ["stock", "進貨"]].map(([v, l]) => (
          <button key={v} onClick={() => setFilter(v)} style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "none", cursor: "pointer", background: filter === v ? "#C6A992" : "#fff", color: filter === v ? "#fff" : "#A59482", fontWeight: filter === v ? 700 : 400, fontSize: 13, boxShadow: "0 1px 6px rgba(139,90,43,0.1)" }}>{l}</button>
        ))}
      </div>

      {/* 篩選：年份 */}
      {years.length > 0 && (
        <div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 10, paddingBottom: 2 }}>
          <button onClick={() => { setSelectedYear("all"); setSelectedMonth("all"); }} style={{ padding: "6px 14px", borderRadius: 20, border: "none", cursor: "pointer", background: selectedYear === "all" ? "#C6A992" : "#fff", color: selectedYear === "all" ? "#fff" : "#A59482", fontWeight: 600, fontSize: 13, whiteSpace: "nowrap", boxShadow: "0 1px 4px rgba(139,90,43,0.1)" }}>所有年份</button>
          {years.map(y => (
            <button key={y} onClick={() => { setSelectedYear(String(y)); setSelectedMonth("all"); }} style={{ padding: "6px 14px", borderRadius: 20, border: "none", cursor: "pointer", background: selectedYear === String(y) ? "#C6A992" : "#fff", color: selectedYear === String(y) ? "#fff" : "#A59482", fontWeight: 600, fontSize: 13, whiteSpace: "nowrap", boxShadow: "0 1px 4px rgba(139,90,43,0.1)" }}>{y}年</button>
          ))}
        </div>
      )}

      {/* 篩選：月份（選年後才出現） */}
      {selectedYear !== "all" && (
        <div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 14, paddingBottom: 2 }}>
          <button onClick={() => setSelectedMonth("all")} style={{ padding: "6px 12px", borderRadius: 20, border: "none", cursor: "pointer", background: selectedMonth === "all" ? "#DBC8B6" : "#fff", color: selectedMonth === "all" ? "#fff" : "#A59482", fontWeight: 600, fontSize: 12, whiteSpace: "nowrap", boxShadow: "0 1px 4px rgba(139,90,43,0.1)" }}>全月</button>
          {MONTHS.map((m, idx) => (
            <button key={idx} onClick={() => setSelectedMonth(String(idx + 1))} style={{ padding: "6px 12px", borderRadius: 20, border: "none", cursor: "pointer", background: selectedMonth === String(idx + 1) ? "#DBC8B6" : "#fff", color: selectedMonth === String(idx + 1) ? "#fff" : "#A59482", fontWeight: 600, fontSize: 12, whiteSpace: "nowrap", boxShadow: "0 1px 4px rgba(139,90,43,0.1)" }}>{m}</button>
          ))}
        </div>
      )}

      {/* 選年後顯示該年統計 */}
      {selectedYear !== "all" && (() => {
        const yr = records.filter(r => getYearMonth(r).year === Number(selectedYear));
        const yRev = yr.filter(r => r.type === "sale").reduce((s, r) => s + r.totalRevenue, 0);
        const yProfit = yr.filter(r => r.type === "sale").reduce((s, r) => s + r.netProfit, 0);
        const yStock = yr.filter(r => r.type === "stock").reduce((s, r) => s + r.totalCost, 0);
        const yMargin = yRev > 0 ? (yProfit / yRev * 100).toFixed(1) : "—";
        return (
          <Card style={{ background: "linear-gradient(135deg,#2c3e50,#4a6274)", padding: 16, marginBottom: 14 }}>
            <div style={{ color: "#a0b8c8", fontSize: 11, fontWeight: 700, marginBottom: 10 }}>📅 {selectedYear}年 年度統計</div>
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px" }}>
                <div style={{ color: "#a0b8c8", fontSize: 10, marginBottom: 3 }}>年度營業額</div>
                <div style={{ color: "#fff", fontFamily: "monospace", fontSize: 15, fontWeight: 700 }}>{ntd(yRev)}</div>
              </div>
              <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px" }}>
                <div style={{ color: "#a0b8c8", fontSize: 10, marginBottom: 3 }}>年度淨利潤</div>
                <div style={{ color: yProfit >= 0 ? "#7de8a8" : "#ff8070", fontFamily: "monospace", fontSize: 15, fontWeight: 700 }}>{ntd(yProfit)}</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px" }}>
                <div style={{ color: "#a0b8c8", fontSize: 10, marginBottom: 3 }}>年度進貨成本</div>
                <div style={{ color: "#fff", fontFamily: "monospace", fontSize: 15, fontWeight: 700 }}>{ntd(yStock)}</div>
              </div>
              <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px" }}>
                <div style={{ color: "#a0b8c8", fontSize: 10, marginBottom: 3 }}>年度利潤率</div>
                <div style={{ color: "#fbd38d", fontFamily: "monospace", fontSize: 15, fontWeight: 700 }}>{yMargin}{yMargin !== "—" ? "%" : ""}</div>
              </div>
            </div>
          </Card>
        );
      })()}

      {filtered.length === 0 && <div style={{ textAlign: "center", color: "#C4B1A0", padding: "40px 0", fontSize: 14 }}><div style={{ fontSize: 40, marginBottom: 12 }}>📋</div>這個區間沒有紀錄</div>}

      {/* 按月份分組顯示 */}
      {groupKeys.map(key => {
        const { year, month, records: monthRecords } = grouped[key];
        const isCollapsed = collapsedMonths[key];
        const monthSales = monthRecords.filter(r => r.type === "sale").reduce((s, r) => s + r.netProfit, 0);
        const monthRevenue = monthRecords.filter(r => r.type === "sale").reduce((s, r) => s + r.totalRevenue, 0);
        return (
          <div key={key}>
            {/* 月份標題列 */}
            <div onClick={() => toggleMonth(key)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 4px", marginBottom: 8, cursor: "pointer" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 16, fontWeight: 700, color: "#A59482" }}>{year}年 {month}月</span>
                <span style={{ fontSize: 12, color: "#C4B1A0" }}>{monthRecords.length} 筆</span>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 13, fontFamily: "monospace", fontWeight: 700, color: monthSales >= 0 ? "#1a6b3a" : "#c0392b" }}>利潤 {ntd(monthSales)}</div>
                {monthRevenue > 0 && <div style={{ fontSize: 11, color: "#C4B1A0" }}>營業額 {ntd(monthRevenue)}</div>}
                <div style={{ fontSize: 11, color: "#C4B1A0", marginTop: 2 }}>{isCollapsed ? "▶ 展開" : "▼ 收合"}</div>
              </div>
            </div>
            {!isCollapsed && monthRecords.map(r => (
              <RecordCard key={r.id} r={r} expanded={expanded} setExpanded={setExpanded} setDeleting={setDeleting} />
            ))}
            <div style={{ height: 1, background: "#DBC8B6", margin: "4px 0 16px" }} />
          </div>
        );
      })}
    </div>
  );
}

function CustomerForm({ customer, onSave, onCancel }) {
  const [name, setName] = useState(customer?.name || "");
  const [platform, setPlatform] = useState(customer?.platform || "蝦皮");
  const [buyCount, setBuyCount] = useState(customer?.buyCount || "首次購買");
  const [buyDate, setBuyDate] = useState(customer?.buyDate || todayFull());
  const [careDate, setCareDate] = useState(customer?.careDate || "");
  const [careNote, setCareNote] = useState(customer?.careNote || "");
  const [tags, setTags] = useState(customer?.tags || []);
  const [purchases, setPurchases] = useState(customer?.purchases || [{ date: "", product: "", note: "" }]);
  const [usage, setUsage] = useState(customer?.usage || { morning: "", noon: "", evening: "", sleep: "" });
  const toggleTag = (t) => setTags(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);
  const addPurchase = () => setPurchases(prev => [...prev, { date: "", product: "", note: "" }]);
  const updatePurchase = (i, field, val) => setPurchases(prev => prev.map((p, idx) => idx === i ? { ...p, [field]: val } : p));
  const removePurchase = (i) => setPurchases(prev => prev.filter((_, idx) => idx !== i));
  const handleSave = () => { if (!name.trim()) return alert("請填入顧客名稱"); onSave({ id: customer?.id || nowId(), name: name.trim(), platform, buyCount, buyDate, careDate, careNote, tags, purchases, usage }); };
  return (
    <div style={{ position: "fixed", inset: 0, background: "#ede0d4", zIndex: 200, overflowY: "auto" }}>
      <div style={{ background: "linear-gradient(135deg,#A59482,#C6A992)", padding: "44px 20px 16px", color: "#fff", display: "flex", alignItems: "center", gap: 12 }}>
        <button onClick={onCancel} style={{ background: "none", border: "none", color: "#DBC8B6", fontSize: 22, cursor: "pointer", padding: 0 }}>←</button>
        <div style={{ fontSize: 18, fontWeight: 700 }}>{customer ? "編輯顧客" : "新增顧客"}</div>
      </div>
      <div style={{ padding: "16px 16px 80px" }}>
        <Card><Label>顧客名稱 / 帳號</Label><TextInput value={name} onChange={setName} placeholder="例：own1010" /></Card>
        <Card>
          <Label>購買平台</Label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {PLATFORMS.map(p => <button key={p} onClick={() => setPlatform(p)} style={{ padding: "7px 14px", borderRadius: 20, border: "none", cursor: "pointer", background: platform === p ? "#C6A992" : "#ede0d4", color: platform === p ? "#fff" : "#A59482", fontWeight: 600, fontSize: 13 }}>{p}</button>)}
          </div>
        </Card>
        <Card>
          <Label>購買次數</Label>
          <div style={{ display: "flex", gap: 8 }}>
            {BUY_COUNTS.map(b => <button key={b} onClick={() => setBuyCount(b)} style={{ flex: 1, padding: "8px 4px", borderRadius: 8, border: "none", cursor: "pointer", background: buyCount === b ? "#C6A992" : "#ede0d4", color: buyCount === b ? "#fff" : "#A59482", fontWeight: 600, fontSize: 11 }}>{b}</button>)}
          </div>
        </Card>
        <Card><Label>購買日期</Label><DateInput value={buyDate} onChange={setBuyDate} /></Card>
        <Card>
          <Label>標籤</Label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {TAGS.map(t => <button key={t} onClick={() => toggleTag(t)} style={{ padding: "7px 14px", borderRadius: 20, border: "none", cursor: "pointer", background: tags.includes(t) ? "#C6A992" : "#ede0d4", color: tags.includes(t) ? "#fff" : "#A59482", fontWeight: 600, fontSize: 13 }}>{t}</button>)}
          </div>
        </Card>
        <Card>
          <Label>已關心日期</Label>
          <DateInput value={careDate} onChange={setCareDate} />
          <div style={{ marginTop: 10 }}><Label>關心事項</Label><TextInput value={careNote} onChange={setCareNote} placeholder="例：試用、健康問題" /></div>
        </Card>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <Label>購買紀錄</Label>
            <button onClick={addPurchase} style={{ border: "none", background: "#ede0d4", color: "#C6A992", borderRadius: 8, padding: "5px 12px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>＋ 新增</button>
          </div>
          {purchases.map((p, i) => (
            <div key={i} style={{ background: "#f7f2ee", borderRadius: 10, padding: 12, marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontSize: 13, color: "#A59482", fontWeight: 600 }}>第 {i + 1} 筆</span>
                {purchases.length > 1 && <button onClick={() => removePurchase(i)} style={{ border: "none", background: "none", color: "#c0392b", fontSize: 16, cursor: "pointer", padding: 0 }}>✕</button>}
              </div>

              <div><Label>備註</Label><TextInput value={p.note} onChange={v => updatePurchase(i, "note", v)} placeholder="選填" /></div>
            </div>
          ))}
        </Card>
        <Card>
          <Label>產品吃法</Label>
          {[["morning", "早"], ["noon", "中"], ["evening", "晚"], ["sleep", "睡前"]].map(([k, l]) => (
            <div key={k} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <span style={{ fontSize: 13, color: "#A59482", fontWeight: 600, width: 32 }}>{l}</span>
              <div style={{ flex: 1 }}><TextInput value={usage[k]} onChange={v => setUsage(prev => ({ ...prev, [k]: v }))} placeholder="選填" /></div>
            </div>
          ))}
        </Card>
        <button onClick={handleSave} style={{ width: "100%", padding: 15, borderRadius: 14, border: "none", background: "linear-gradient(135deg,#A59482,#C6A992)", color: "#fff", cursor: "pointer", fontSize: 16, fontWeight: 700 }}>
          💾 {customer ? "儲存修改" : "新增顧客"}
        </button>
      </div>
    </div>
  );
}

function CustomersTab({ customers, onAdd, onUpdate, onDelete, salesRecords }) {
  const [search, setSearch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editCustomer, setEditCustomer] = useState(null);
  const [viewCustomer, setViewCustomer] = useState(null);
  const [filterTag, setFilterTag] = useState("");

  // 計算購買日期距今天數
  const getDaysSince = (dateStr) => {
    if (!dateStr) return null;
    const parts = dateStr.replace(/\//g, "-").split("-");
    if (parts.length !== 3) return null;
    const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diff = Math.floor((today - d) / (1000 * 60 * 60 * 24));
    return isNaN(diff) ? null : diff;
  };

  // 判斷是否需要關心（第3天或第7天，且尚未關心）
  const getNeedFollowUp = (c) => {
    if (c.careDate) return null; // 已關心就不提醒
    const days = getDaysSince(c.buyDate);
    if (days === null) return null;
    if (days === 3) return { label: "第3天提醒", color: "#e67e22", bg: "#fff3e0", days };
    if (days === 7) return { label: "第7天提醒", color: "#c0392b", bg: "#fff0ee", days };
    if (days > 3 && days < 7 && !c.careDate) return { label: `第${days}天`, color: "#A59482", bg: "#faf6f2", days };
    if (days > 7 && !c.careDate) return { label: `第${days}天未關心`, color: "#c0392b", bg: "#fff0ee", days };
    return null;
  };

  // 排序：需要關心的排最前面（第7天 > 第3天 > 其他），再按購買日期新→舊
  const sortCustomers = (list) => {
    return [...list].sort((a, b) => {
      const fa = getNeedFollowUp(a);
      const fb = getNeedFollowUp(b);
      const urgencyA = fa ? (fa.days === 7 ? 0 : fa.days === 3 ? 1 : 2) : 99;
      const urgencyB = fb ? (fb.days === 7 ? 0 : fb.days === 3 ? 1 : 2) : 99;
      if (urgencyA !== urgencyB) return urgencyA - urgencyB;
      return 0;
    });
  };

  const filtered = sortCustomers(
    customers.filter(c => c.name.includes(search) && (filterTag === "" || c.tags.includes(filterTag)))
  );

  // 需要提醒的數量（第3天或第7天）
  const urgentCount = customers.filter(c => {
    const days = getDaysSince(c.buyDate);
    return !c.careDate && (days === 3 || days === 7);
  }).length;

  const handleSave = (c) => { if (editCustomer) onUpdate(c); else onAdd(c); setShowForm(false); setEditCustomer(null); };

  return (
    <div>
      {showForm && <CustomerForm customer={editCustomer} onSave={handleSave} onCancel={() => { setShowForm(false); setEditCustomer(null); }} />}
      {viewCustomer && <CustomerDetail customer={viewCustomer} salesRecords={salesRecords} onEdit={() => { setEditCustomer(viewCustomer); setShowForm(true); setViewCustomer(null); }} onDelete={() => { onDelete(viewCustomer.id); setViewCustomer(null); }} onClose={() => setViewCustomer(null)} />}

      {/* 提醒橫幅 */}
      {urgentCount > 0 && (
        <div style={{ background: "linear-gradient(135deg, #c0392b, #e67e22)", borderRadius: 14, padding: "12px 16px", marginBottom: 14, display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ fontSize: 24 }}>🔔</div>
          <div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>有 {urgentCount} 位顧客需要關心！</div>
            <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 12, marginTop: 2 }}>購買後第3天或第7天，記得主動聯繫 💬</div>
          </div>
        </div>
      )}

      <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜尋顧客..."
          style={{ flex: 1, border: "1.5px solid #DBC8B6", borderRadius: 10, padding: "10px 12px", fontSize: 15, background: "#fff", outline: "none" }} />
        <button onClick={() => { setEditCustomer(null); setShowForm(true); }} style={{ padding: "10px 16px", borderRadius: 10, border: "none", background: "linear-gradient(135deg,#A59482,#C6A992)", color: "#fff", cursor: "pointer", fontSize: 14, fontWeight: 700, whiteSpace: "nowrap" }}>＋ 新增</button>
      </div>
      <div style={{ display: "flex", gap: 6, overflowX: "auto", marginBottom: 14, paddingBottom: 4 }}>
        <button onClick={() => setFilterTag("")} style={{ padding: "5px 12px", borderRadius: 20, border: "none", cursor: "pointer", background: filterTag === "" ? "#C6A992" : "#fff", color: filterTag === "" ? "#fff" : "#A59482", fontWeight: 600, fontSize: 12, whiteSpace: "nowrap", boxShadow: "0 1px 4px rgba(139,90,43,0.1)" }}>全部</button>
        {TAGS.map(t => <button key={t} onClick={() => setFilterTag(filterTag === t ? "" : t)} style={{ padding: "5px 12px", borderRadius: 20, border: "none", cursor: "pointer", background: filterTag === t ? "#C6A992" : "#fff", color: filterTag === t ? "#fff" : "#A59482", fontWeight: 600, fontSize: 12, whiteSpace: "nowrap", boxShadow: "0 1px 4px rgba(139,90,43,0.1)" }}>{t}</button>)}
      </div>
      {filtered.length === 0 && <div style={{ textAlign: "center", color: "#C4B1A0", padding: "40px 0", fontSize: 14 }}><div style={{ fontSize: 40, marginBottom: 12 }}>👤</div>{customers.length === 0 ? "還沒有顧客，點右上角「＋新增」" : "找不到符合的顧客"}</div>}
      {filtered.map(c => {
        const custSales = salesRecords.filter(r => r.type === "sale" && r.customerId === c.id);
        const followUp = getNeedFollowUp(c);
        const isUrgent = followUp && (followUp.days === 3 || followUp.days === 7);
        return (
          <Card key={c.id} style={{ padding: 0, overflow: "hidden", border: isUrgent ? `2px solid ${followUp.color}` : "none" }}>
            {isUrgent && (
              <div style={{ background: followUp.bg, padding: "6px 16px", display: "flex", alignItems: "center", gap: 6, borderBottom: `1px solid ${followUp.color}30` }}>
                <span style={{ fontSize: 14 }}>{followUp.days === 7 ? "🚨" : "⏰"}</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: followUp.color }}>{followUp.label}｜記得關心這位顧客！</span>
              </div>
            )}
            <div onClick={() => setViewCustomer(c)} style={{ padding: "14px 16px", cursor: "pointer" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 15, color: "#A59482", marginBottom: 4 }}>{c.name}</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: "#fef3e8", color: "#c17d2a", fontWeight: 600 }}>{c.platform}</span>
                    <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: "#f0f0ff", color: "#5050c0", fontWeight: 600 }}>{c.buyCount}</span>
                    {c.tags.slice(0, 2).map(t => <span key={t} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: "#e8f5ec", color: "#1a6b3a", fontWeight: 600 }}>{t}</span>)}
                    {followUp && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: followUp.bg, color: followUp.color, fontWeight: 600 }}>{followUp.label}</span>}
                  </div>
                  {c.buyDate && <div style={{ fontSize: 12, color: "#C4B1A0", marginTop: 4 }}>購買：{c.buyDate}{c.careDate ? ` · 關心：${c.careDate}` : ""}</div>}
                </div>
                <div style={{ textAlign: "right", marginLeft: 10 }}>
                  {custSales.length > 0 && <div style={{ fontSize: 12, color: "#1a6b3a", fontWeight: 600 }}>{custSales.length} 筆紀錄</div>}
                  <div style={{ fontSize: 16, color: "#C4B1A0" }}>›</div>
                </div>
              </div>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState(0);
  const [records, setRecords] = useState(() => { try { const s = localStorage.getItem(LS_KEY); return s ? JSON.parse(s) : []; } catch { return []; } });
  const [customers, setCustomers] = useState(() => { try { const s = localStorage.getItem(LS_CUSTOMERS); return s ? JSON.parse(s) : []; } catch { return []; } });
  const [importMsg, setImportMsg] = useState("");

  useEffect(() => { try { localStorage.setItem(LS_KEY, JSON.stringify(records)); } catch {} }, [records]);
  useEffect(() => { try { localStorage.setItem(LS_CUSTOMERS, JSON.stringify(customers)); } catch {} }, [customers]);

  const addRecord = useCallback((r) => setRecords(prev => [r, ...prev]), []);
  const deleteRecord = useCallback((id) => setRecords(prev => prev.filter(r => r.id !== id)), []);
  const addCustomer = useCallback((c) => setCustomers(prev => [c, ...prev]), []);
  const updateCustomer = useCallback((c) => setCustomers(prev => prev.map(x => x.id === c.id ? c : x)), []);
  const deleteCustomer = useCallback((id) => setCustomers(prev => prev.filter(c => c.id !== id)), []);

  // 計算累計硬幣：進貨 ÷100 + 銷售淨利 ÷10

    records.filter(r => r.type === "stock").reduce((s, r) => s + r.totalCost, 0) / 100 +
    records.filter(r => r.type === "sale" && r.netProfit > 0).reduce((s, r) => s + r.netProfit, 0) / 10

  const exportData = () => {
    const blob = new Blob([JSON.stringify({ records, customers }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `皇家MORE備份_${new Date().toLocaleDateString("zh-TW").replace(/\//g, "-")}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) {
          setRecords(prev => { const ids = new Set(prev.map(r => r.id)); return [...data.filter(r => !ids.has(r.id)), ...prev]; });
          setImportMsg(`✅ 成功匯入 ${data.length} 筆紀錄！`);
        } else {
          if (data.records) setRecords(prev => { const ids = new Set(prev.map(r => r.id)); return [...data.records.filter(r => !ids.has(r.id)), ...prev]; });
          if (data.customers) setCustomers(prev => { const ids = new Set(prev.map(c => c.id)); return [...data.customers.filter(c => !ids.has(c.id)), ...prev]; });
          setImportMsg("✅ 成功匯入！");
        }
      } catch { setImportMsg("❌ 檔案格式錯誤"); }
      setTimeout(() => setImportMsg(""), 3000);
    };
    reader.readAsText(file);
    e.target.value = "";
