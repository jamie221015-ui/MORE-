<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="皇家MORE" />
  <meta name="theme-color" content="#3d2b1f" />
  <title>皇家MORE 記帳</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #f5ede0; font-family: -apple-system, sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useEffect } = React;

const PRODUCTS = [
  { name: "纖纖飲X", cost: 700, prices: [1480, 1380, 1280] },
  { name: "爆纖錠", cost: 430, prices: [880, 800, 740] },
  { name: "纖飄錠", cost: 700, prices: [1480, 1380, 1280] },
  { name: "纖酵宿", cost: 440, prices: [990, 900, 830] },
  { name: "紫纖飲", cost: 440, prices: [990, 900, 830] },
  { name: "肽纖飲", cost: 440, prices: [990, 900, 830] },
  { name: "厚焙奶茶", cost: 440, prices: [990, 900, 830] },
  { name: "洗髮露", cost: 620, prices: [1280, 1180, 1100] },
  { name: "養髮液", cost: 500, prices: [1080, 990, 900] },
  { name: "水光錠", cost: 740, prices: [1680, 1580, 1480] },
  { name: "婕肌零", cost: 440, prices: [990, 900, 830] },
  { name: "雪聚露", cost: 620, prices: [1280, 1180, 1100] },
  { name: "玻尿酸保濕原液", cost: 440, prices: [990, 900, 830] },
  { name: "急救小白瓶", cost: 620, prices: [1280, 1180, 1100] },
  { name: "護手霜", cost: 320, prices: [680, 630, 600] },
  { name: "面模(精裝盒)", cost: 360, prices: [150, 150, 150] },
  { name: "面模(20片)", cost: 1300, prices: [2200, 2200, 2200] },
  { name: "益生菌", cost: 620, prices: [1280, 1180, 1100] },
  { name: "葉黃素", cost: 500, prices: [1080, 990, 900] },
  { name: "晶亮凍", cost: 320, prices: [680, 630, 600] },
  { name: "固樂纖", cost: 740, prices: [1680, 1580, 1480] },
  { name: "正冠茶", cost: 440, prices: [990, 900, 830] },
  { name: "酒國錠", cost: 320, prices: [680, 630, 600] },
  { name: "爆纖錠體驗包", cost: 120, prices: [240, 240, 240] },
  { name: "纖酵宿體驗包", cost: 75, prices: [190, 190, 190] },
  { name: "洗髮露體驗包", cost: 12, prices: [30, 30, 30] },
  { name: "婕肌零體驗包", cost: 15, prices: [40, 40, 40] },
];

const PRICE_LABELS = ["原價", "優惠價", "VIP價"];
const TABS = ["銷售計算", "進貨紀錄", "歷史紀錄"];
const ntd = (n) => `NT$${Number(n).toLocaleString()}`;
const nowId = () => Date.now().toString();
const today = () => new Date().toLocaleDateString("zh-TW", { month: "numeric", day: "numeric", weekday: "short" });
const LS_KEY = "royal_more_records";

// ── UI Components ──
const Card = ({ children, style = {} }) => (
  <div style={{ background: "#fff", borderRadius: 16, padding: 16, marginBottom: 14, boxShadow: "0 1px 10px rgba(139,90,43,0.09)", ...style }}>
    {children}
  </div>
);
const Label = ({ children }) => (
  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", color: "#a07850", textTransform: "uppercase", marginBottom: 6 }}>{children}</div>
);
const NumInput = ({ value, onChange, placeholder = "0" }) => (
  <input type="number" min="0" value={value} placeholder={placeholder}
    onChange={e => onChange(e.target.value === "" ? "" : Number(e.target.value))}
    style={{ width: "100%", border: "1.5px solid #e8dcc8", borderRadius: 8, padding: "9px 10px", fontSize: 16, fontFamily: "monospace", background: "#fdf8f2", color: "#3d2b1f", outline: "none", boxSizing: "border-box" }} />
);
const TextInput = ({ value, onChange, placeholder }) => (
  <input type="text" value={value} placeholder={placeholder} onChange={e => onChange(e.target.value)}
    style={{ width: "100%", border: "1.5px solid #e8dcc8", borderRadius: 8, padding: "9px 10px", fontSize: 15, background: "#fdf8f2", color: "#3d2b1f", outline: "none", boxSizing: "border-box" }} />
);

// ── Product Picker ──
function ProductPicker({ items, onAdd, onClose }) {
  const [search, setSearch] = useState("");
  const filtered = PRODUCTS.filter(p => p.name.includes(search) && !items.find(i => i.name === p.name));
  return (
    <div>
      <input autoFocus value={search} onChange={e => setSearch(e.target.value)} placeholder="搜尋商品名稱..."
        style={{ width: "100%", border: "1.5px solid #e8dcc8", borderRadius: 8, padding: "9px 10px", fontSize: 15, background: "#fdf8f2", outline: "none", boxSizing: "border-box", marginBottom: 8 }} />
      <div style={{ maxHeight: 220, overflowY: "auto" }}>
        {filtered.map(p => (
          <div key={p.name} onClick={() => onAdd(p)}
            style={{ padding: "10px 12px", borderRadius: 8, marginBottom: 4, background: "#faf7f3", cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontSize: 14, color: "#3d2b1f" }}>{p.name}</span>
            <span style={{ fontSize: 12, color: "#a07850", fontFamily: "monospace" }}>成本 {ntd(p.cost)}</span>
          </div>
        ))}
        {filtered.length === 0 && <div style={{ textAlign: "center", color: "#b09070", padding: 16 }}>找不到商品</div>}
      </div>
      <button onClick={onClose} style={{ width: "100%", marginTop: 8, padding: 9, borderRadius: 8, border: "1px solid #e8dcc8", background: "#fff", color: "#a07850", cursor: "pointer", fontSize: 14 }}>取消</button>
    </div>
  );
}

// ── Save Modal ──
function SaveModal({ isSale, profit, total, onSave, onCancel }) {
  const [customer, setCustomer] = useState("");
  const [note, setNote] = useState("");
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 100, display: "flex", alignItems: "flex-end" }}>
      <div style={{ background: "#fff", borderRadius: "20px 20px 0 0", padding: 24, width: "100%", boxSizing: "border-box" }}>
        <div style={{ fontSize: 17, fontWeight: 700, color: "#3d2b1f", marginBottom: 4 }}>💾 儲存這筆紀錄</div>
        <div style={{ fontSize: 13, color: "#a07850", marginBottom: 18 }}>
          {isSale ? `銷售 · 淨利 ${ntd(profit)}` : `進貨 · 總成本 ${ntd(total)}`}
        </div>
        <Label>{isSale ? "客人姓名（選填）" : "備註"}</Label>
        <div style={{ marginBottom: 14 }}>
          <TextInput value={customer} onChange={setCustomer} placeholder={isSale ? "例：小美" : "例：3月補貨"} />
        </div>
        <Label>備註</Label>
        <div style={{ marginBottom: 20 }}>
          <TextInput value={note} onChange={setNote} placeholder="選填" />
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onCancel} style={{ flex: 1, padding: 13, borderRadius: 12, border: "1.5px solid #e8dcc8", background: "#fff", color: "#a07850", cursor: "pointer", fontSize: 15 }}>取消</button>
          <button onClick={() => onSave(customer, note)} style={{ flex: 2, padding: 13, borderRadius: 12, border: "none", background: "linear-gradient(135deg,#3d2b1f,#6b4226)", color: "#fff", cursor: "pointer", fontSize: 15, fontWeight: 700 }}>✓ 確認儲存</button>
        </div>
      </div>
    </div>
  );
}

function SuccessFlash() {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: 300 }}>
      <div style={{ fontSize: 60 }}>✅</div>
      <div style={{ fontSize: 20, fontWeight: 700, color: "#1a6b3a", marginTop: 16 }}>已儲存！</div>
      <div style={{ fontSize: 14, color: "#a07850", marginTop: 8 }}>可在「歷史紀錄」查看</div>
    </div>
  );
}

// ── Tab 1: 銷售計算 ──
function SalesTab({ onSave }) {
  const [items, setItems] = useState([]);
  const [shipping, setShipping] = useState("");
  const [showPicker, setShowPicker] = useState(false);
  const [showSave, setShowSave] = useState(false);
  const [priceType, setPriceType] = useState(2);
  const [flash, setFlash] = useState(false);

  const addItem = (p) => { setItems(prev => [...prev, { ...p, qty: 1, type: priceType }]); setShowPicker(false); };
  const updateItem = (name, field, val) => setItems(prev => prev.map(i => i.name === name ? { ...i, [field]: val } : i));
  const removeItem = (name) => setItems(prev => prev.filter(i => i.name !== name));

  const totalRevenue = items.reduce((s, i) => s + i.prices[i.type] * (i.qty || 0), 0);
  const totalCost = items.reduce((s, i) => s + i.cost * (i.qty || 0), 0);
  const ship = Number(shipping) || 0;
  const netProfit = totalRevenue - totalCost - ship;
  const margin = totalRevenue > 0 ? (netProfit / totalRevenue * 100) : 0;

  const handleSave = (customer, note) => {
    const record = {
      id: nowId(), date: today(), type: "sale", customer, note,
      items: items.map(i => ({ name: i.name, qty: i.qty, priceLabel: PRICE_LABELS[i.type], unitPrice: i.prices[i.type], unitCost: i.cost })),
      totalRevenue, totalCost, shipping: ship, netProfit, margin: margin.toFixed(1),
    };
    onSave(record);
    setShowSave(false);
    setFlash(true);
    setTimeout(() => { setFlash(false); setItems([]); setShipping(""); }, 1800);
  };

  if (flash) return <SuccessFlash />;

  return (
    <div>
      {showSave && <SaveModal isSale profit={netProfit} onSave={handleSave} onCancel={() => setShowSave(false)} />}

      <Card>
        <Label>售價類型</Label>
        <div style={{ display: "flex", gap: 8 }}>
          {PRICE_LABELS.map((l, i) => (
            <button key={i} onClick={() => setPriceType(i)} style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "none", cursor: "pointer", background: priceType === i ? "#6b4226" : "#f0e8d8", color: priceType === i ? "#fff" : "#7a6550", fontWeight: 600, fontSize: 13 }}>{l}</button>
          ))}
        </div>
      </Card>

      <Card>
        <Label>新增商品</Label>
        {showPicker
          ? <ProductPicker items={items} onAdd={addItem} onClose={() => setShowPicker(false)} />
          : <button onClick={() => setShowPicker(true)} style={{ width: "100%", padding: 11, borderRadius: 10, border: "2px dashed #d4b896", background: "#fdf8f2", color: "#8b6040", cursor: "pointer", fontSize: 15, fontWeight: 600 }}>＋ 選擇商品</button>
        }
      </Card>

      {items.map(item => (
        <Card key={item.name} style={{ padding: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontWeight: 700, fontSize: 15, color: "#3d2b1f" }}>{item.name}</span>
            <button onClick={() => removeItem(item.name)} style={{ border: "none", background: "none", color: "#c0392b", fontSize: 18, cursor: "pointer", padding: 0 }}>✕</button>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
            {PRICE_LABELS.map((l, i) => (
              <button key={i} onClick={() => updateItem(item.name, "type", i)}
                style={{ flex: 1, padding: "6px 0", borderRadius: 7, border: "none", cursor: "pointer", fontSize: 11, background: item.type === i ? "#6b4226" : "#f0e8d8", color: item.type === i ? "#fff" : "#7a6550", fontWeight: 600 }}>
                {l}<br /><span style={{ fontSize: 11 }}>{ntd(item.prices[i])}</span>
              </button>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <div style={{ flex: 1 }}>
              <Label>數量</Label>
              <NumInput value={item.qty} onChange={v => updateItem(item.name, "qty", v)} />
            </div>
            <div style={{ flex: 2, background: "#faf7f3", borderRadius: 8, padding: "8px 12px" }}>
              <div style={{ fontSize: 11, color: "#a07850" }}>小計</div>
              <div style={{ fontSize: 17, fontFamily: "monospace", fontWeight: 700, color: "#3d2b1f" }}>{ntd(item.prices[item.type] * (item.qty || 0))}</div>
              <div style={{ fontSize: 11, color: "#b09070" }}>利潤 {ntd((item.prices[item.type] - item.cost) * (item.qty || 0))}</div>
            </div>
          </div>
        </Card>
      ))}

      {items.length > 0 && (
        <Card>
          <Label>運費 / 手續費</Label>
          <NumInput value={shipping} onChange={setShipping} placeholder="選填" />
        </Card>
      )}

      {items.length > 0 && (
        <Card style={{ background: "linear-gradient(135deg,#3d2b1f,#6b4226)", padding: 18 }}>
          <div style={{ color: "#c9a880", fontSize: 12, fontWeight: 700, letterSpacing: "0.1em", marginBottom: 12 }}>📊 本單結算</div>
          <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 10, padding: 12, marginBottom: 8 }}>
            {[["總營業額", ntd(totalRevenue)], ["總進貨成本", ntd(totalCost)], ...(ship > 0 ? [["運費/手續費", ntd(ship)]] : [])].map(([l, v]) => (
              <div key={l} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ color: "#c9a880", fontSize: 13 }}>{l}</span>
                <span style={{ color: "#fff", fontFamily: "monospace", fontSize: 13 }}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: netProfit < 0 ? "rgba(192,57,43,0.25)" : "rgba(26,107,58,0.25)", borderRadius: 10, padding: "12px 14px" }}>
            <span style={{ color: netProfit < 0 ? "#f5a89e" : "#7de8a8", fontSize: 14, fontWeight: 700 }}>淨利潤</span>
            <span style={{ color: netProfit < 0 ? "#ff8070" : "#7de8a8", fontFamily: "monospace", fontSize: 22, fontWeight: 700 }}>{ntd(netProfit)}</span>
          </div>
          <div style={{ textAlign: "center", color: "#c9a880", fontSize: 13, margin: "8px 0 16px" }}>利潤率 {margin.toFixed(1)}%</div>
          <button onClick={() => setShowSave(true)} style={{ width: "100%", padding: 14, borderRadius: 12, border: "2px solid rgba(201,168,128,0.5)", background: "rgba(255,255,255,0.12)", color: "#fff", cursor: "pointer", fontSize: 16, fontWeight: 700 }}>
            💾 儲存這筆紀錄
          </button>
        </Card>
      )}

      {items.length === 0 && <div style={{ textAlign: "center", color: "#b09070", padding: "40px 0", fontSize: 14 }}>☝️ 點上方「選擇商品」開始記錄</div>}
    </div>
  );
}

// ── Tab 2: 進貨紀錄 ──
function StockTab({ onSave }) {
  const [items, setItems] = useState([]);
  const [otherCost, setOtherCost] = useState("");
  const [showPicker, setShowPicker] = useState(false);
  const [showSave, setShowSave] = useState(false);
  const [flash, setFlash] = useState(false);

  const addItem = (p) => { setItems(prev => [...prev, { ...p, qty: "" }]); setShowPicker(false); };
  const updateQty = (name, qty) => setItems(prev => prev.map(i => i.name === name ? { ...i, qty } : i));
  const removeItem = (name) => setItems(prev => prev.filter(i => i.name !== name));

  const totalStock = items.reduce((s, i) => s + i.cost * (Number(i.qty) || 0), 0);
  const other = Number(otherCost) || 0;
  const totalCost = totalStock + other;

  const handleSave = (label, note) => {
    const record = {
      id: nowId(), date: today(), type: "stock", customer: label, note,
      items: items.map(i => ({ name: i.name, qty: Number(i.qty) || 0, unitCost: i.cost })),
      totalStock, otherCost: other, totalCost,
    };
    onSave(record);
    setShowSave(false);
    setFlash(true);
    setTimeout(() => { setFlash(false); setItems([]); setOtherCost(""); }, 1800);
  };

  if (flash) return <SuccessFlash />;

  return (
    <div>
      {showSave && <SaveModal isSale={false} total={totalCost} onSave={handleSave} onCancel={() => setShowSave(false)} />}

      <Card>
        <Label>新增進貨商品</Label>
        {showPicker
          ? <ProductPicker items={items} onAdd={addItem} onClose={() => setShowPicker(false)} />
          : <button onClick={() => setShowPicker(true)} style={{ width: "100%", padding: 11, borderRadius: 10, border: "2px dashed #d4b896", background: "#fdf8f2", color: "#8b6040", cursor: "pointer", fontSize: 15, fontWeight: 600 }}>＋ 選擇進貨商品</button>
        }
      </Card>

      {items.map(item => (
        <Card key={item.name} style={{ padding: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, color: "#3d2b1f" }}>{item.name}</div>
              <div style={{ fontSize: 12, color: "#a07850" }}>進貨成本 {ntd(item.cost)} / 件</div>
            </div>
            <button onClick={() => removeItem(item.name)} style={{ border: "none", background: "none", color: "#c0392b", fontSize: 18, cursor: "pointer", padding: 0 }}>✕</button>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <div style={{ flex: 1 }}>
              <Label>數量（件）</Label>
              <NumInput value={item.qty} onChange={v => updateQty(item.name, v)} />
            </div>
            <div style={{ flex: 2, background: "#faf7f3", borderRadius: 8, padding: "8px 12px" }}>
              <div style={{ fontSize: 11, color: "#a07850" }}>小計</div>
              <div style={{ fontSize: 17, fontFamily: "monospace", fontWeight: 700, color: "#3d2b1f" }}>{ntd(item.cost * (Number(item.qty) || 0))}</div>
            </div>
          </div>
        </Card>
      ))}

      {items.length > 0 && (
        <>
          <Card>
            <Label>其他費用（運費、關稅等）</Label>
            <NumInput value={otherCost} onChange={setOtherCost} placeholder="選填" />
          </Card>
          <Card style={{ background: "linear-gradient(135deg,#3d2b1f,#6b4226)", padding: 18 }}>
            <div style={{ color: "#c9a880", fontSize: 12, fontWeight: 700, letterSpacing: "0.1em", marginBottom: 12 }}>📦 進貨成本總計</div>
            <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 10, padding: 12, marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ color: "#c9a880", fontSize: 13 }}>商品進貨金額</span>
                <span style={{ color: "#fff", fontFamily: "monospace", fontSize: 13 }}>{ntd(totalStock)}</span>
              </div>
              {other > 0 && (
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ color: "#c9a880", fontSize: 13 }}>其他費用</span>
                  <span style={{ color: "#fff", fontFamily: "monospace", fontSize: 13 }}>{ntd(other)}</span>
                </div>
              )}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(255,255,255,0.12)", borderRadius: 10, padding: "12px 14px", marginBottom: 16 }}>
              <span style={{ color: "#c9a880", fontSize: 14, fontWeight: 700 }}>總進貨成本</span>
              <span style={{ color: "#fff", fontFamily: "monospace", fontSize: 22, fontWeight: 700 }}>{ntd(totalCost)}</span>
            </div>
            <button onClick={() => setShowSave(true)} style={{ width: "100%", padding: 14, borderRadius: 12, border: "2px solid rgba(201,168,128,0.5)", background: "rgba(255,255,255,0.12)", color: "#fff", cursor: "pointer", fontSize: 16, fontWeight: 700 }}>
              💾 儲存這筆進貨
            </button>
          </Card>
        </>
      )}

      {items.length === 0 && <div style={{ textAlign: "center", color: "#b09070", padding: "40px 0", fontSize: 14 }}>☝️ 點上方「選擇進貨商品」開始記錄</div>}
    </div>
  );
}

// ── Tab 3: 歷史紀錄 ──
function HistoryTab({ records, onDelete }) {
  const [filter, setFilter] = useState("all");
  const [expanded, setExpanded] = useState(null);
  const [deleting, setDeleting] = useState(null);

  const filtered = filter === "all" ? records : records.filter(r => r.type === filter);
  const totalSales = records.filter(r => r.type === "sale").reduce((s, r) => s + r.netProfit, 0);
  const totalStock = records.filter(r => r.type === "stock").reduce((s, r) => s + r.totalCost, 0);

  return (
    <div>
      {deleting && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#fff", borderRadius: 20, padding: 24, width: "100%", maxWidth: 340, boxSizing: "border-box" }}>
            <div style={{ fontSize: 17, fontWeight: 700, color: "#3d2b1f", marginBottom: 8 }}>確定要刪除？</div>
            <div style={{ fontSize: 13, color: "#a07850", marginBottom: 20 }}>刪除後無法復原</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setDeleting(null)} style={{ flex: 1, padding: 12, borderRadius: 12, border: "1.5px solid #e8dcc8", background: "#fff", color: "#a07850", cursor: "pointer", fontSize: 14 }}>取消</button>
              <button onClick={() => { onDelete(deleting); setDeleting(null); setExpanded(null); }} style={{ flex: 1, padding: 12, borderRadius: 12, border: "none", background: "#c0392b", color: "#fff", cursor: "pointer", fontSize: 14, fontWeight: 700 }}>刪除</button>
            </div>
          </div>
        </div>
      )}

      {records.length > 0 && (
        <Card style={{ background: "linear-gradient(135deg,#3d2b1f,#6b4226)", padding: 16 }}>
          <div style={{ color: "#c9a880", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", marginBottom: 10 }}>累計統計</div>
          <div style={{ display: "flex", gap: 10 }}>
            <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px" }}>
              <div style={{ color: "#c9a880", fontSize: 11, marginBottom: 4 }}>累計淨利潤</div>
              <div style={{ color: totalSales >= 0 ? "#7de8a8" : "#ff8070", fontFamily: "monospace", fontSize: 17, fontWeight: 700 }}>{ntd(totalSales)}</div>
            </div>
            <div style={{ flex: 1, background: "rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px 12px" }}>
              <div style={{ color: "#c9a880", fontSize: 11, marginBottom: 4 }}>累計進貨成本</div>
              <div style={{ color: "#fff", fontFamily: "monospace", fontSize: 17, fontWeight: 700 }}>{ntd(totalStock)}</div>
            </div>
          </div>
        </Card>
      )}

      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        {[["all", "全部"], ["sale", "銷售"], ["stock", "進貨"]].map(([v, l]) => (
          <button key={v} onClick={() => setFilter(v)} style={{ flex: 1, padding: "8px 0", borderRadius: 8, border: "none", cursor: "pointer", background: filter === v ? "#6b4226" : "#fff", color: filter === v ? "#fff" : "#a07850", fontWeight: filter === v ? 700 : 400, fontSize: 13, boxShadow: "0 1px 6px rgba(139,90,43,0.1)" }}>{l}</button>
        ))}
      </div>

      {filtered.length === 0 && (
        <div style={{ textAlign: "center", color: "#b09070", padding: "50px 0", fontSize: 14 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>📋</div>
          還沒有紀錄<br />完成計算後點「儲存」就會出現在這裡
        </div>
      )}

      {filtered.map(r => (
        <Card key={r.id} style={{ padding: 0, overflow: "hidden" }}>
          <div onClick={() => setExpanded(expanded === r.id ? null : r.id)} style={{ padding: "14px 16px", cursor: "pointer" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                  <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 20, background: r.type === "sale" ? "#e8f5ec" : "#fef3e8", color: r.type === "sale" ? "#1a6b3a" : "#c17d2a", whiteSpace: "nowrap" }}>
                    {r.type === "sale" ? "銷售" : "進貨"}
                  </span>
                  <span style={{ fontSize: 12, color: "#b09070" }}>{r.date}</span>
                </div>
                {r.customer && <div style={{ fontSize: 14, color: "#3d2b1f", fontWeight: 600 }}>{r.customer}</div>}
                {r.note && <div style={{ fontSize: 12, color: "#a07850" }}>{r.note}</div>}
                <div style={{ fontSize: 12, color: "#b09070", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {r.items.map(i => `${i.name}×${i.qty}`).join("、")}
                </div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 10 }}>
                <div style={{ fontSize: 16, fontFamily: "monospace", fontWeight: 700, color: r.type === "sale" ? (r.netProfit >= 0 ? "#1a6b3a" : "#c0392b") : "#3d2b1f" }}>
                  {r.type === "sale" ? ntd(r.netProfit) : ntd(r.totalCost)}
                </div>
                <div style={{ fontSize: 11, color: "#b09070" }}>{r.type === "sale" ? `利潤率 ${r.margin}%` : "進貨成本"}</div>
              </div>
            </div>
          </div>

          {expanded === r.id && (
            <div style={{ borderTop: "1px solid #f0e8d8", padding: "12px 16px", background: "#faf7f3" }}>
              {r.items.map(i => (
                <div key={i.name} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 13, color: "#5a4030" }}>{i.name} × {i.qty}</span>
                  <span style={{ fontSize: 13, fontFamily: "monospace", color: "#7a6550" }}>
                    {r.type === "sale" ? `${i.priceLabel} ${ntd(i.unitPrice * i.qty)}` : ntd(i.unitCost * i.qty)}
                  </span>
                </div>
              ))}
              {r.type === "sale" && r.shipping > 0 && (
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 13, color: "#5a4030" }}>運費/手續費</span>
                  <span style={{ fontSize: 13, fontFamily: "monospace", color: "#7a6550" }}>{ntd(r.shipping)}</span>
                </div>
              )}
              <div style={{ height: 1, background: "#e8dcc8", margin: "10px 0" }} />
              {r.type === "sale" && (
                <div style={{ fontSize: 12, color: "#7a6550", fontFamily: "monospace", lineHeight: 1.8 }}>
                  營業額 {ntd(r.totalRevenue)}<br />
                  成本 {ntd(r.totalCost)}<br />
                  <span style={{ color: r.netProfit >= 0 ? "#1a6b3a" : "#c0392b", fontWeight: 700 }}>淨利 {ntd(r.netProfit)}</span>
                </div>
              )}
              <button onClick={() => setDeleting(r.id)} style={{ marginTop: 12, width: "100%", padding: 10, borderRadius: 10, border: "1px solid #f5bdb5", background: "#fff5f4", color: "#c0392b", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
                🗑 刪除這筆紀錄
              </button>
            </div>
          )}
        </Card>
      ))}
    </div>
  );
}

// ── Main App ──
function App() {
  const [tab, setTab] = useState(0);
  const [records, setRecords] = useState(() => {
    try {
      const saved = localStorage.getItem(LS_KEY);
      return saved ? JSON.parse(saved) : [];
    } catch { return []; }
  });

  useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(records)); } catch {}
  }, [records]);

  const addRecord = useCallback((record) => {
    setRecords(prev => [record, ...prev]);
  }, []);

  const deleteRecord = useCallback((id) => {
    setRecords(prev => prev.filter(r => r.id !== id));
  }, []);

  return (
    <div style={{ minHeight: "100vh", background: "#f5ede0", fontFamily: "-apple-system, sans-serif" }}>
      <div style={{ background: "linear-gradient(135deg, #3d2b1f 0%, #6b4226 100%)", padding: "44px 20px 20px", color: "white" }}>
        <div style={{ fontSize: 11, color: "#c9a880", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 4 }}>皇家 MORE</div>
        <div style={{ fontSize: 22, fontWeight: 700 }}>記帳 & 利潤計算</div>
        <div style={{ fontSize: 12, color: "#c9a880", marginTop: 4 }}>銷售 · 進貨 · 歷史紀錄</div>
      </div>

      <div style={{ display: "flex", background: "#fff", borderBottom: "2px solid #f0e8d8", position: "sticky", top: 0, zIndex: 10 }}>
        {TABS.map((t, i) => (
          <button key={i} onClick={() => setTab(i)} style={{ flex: 1, padding: "12px 0", border: "none", background: "none", cursor: "pointer", fontSize: 13, fontWeight: tab === i ? 700 : 400, color: tab === i ? "#6b4226" : "#a07850", borderBottom: tab === i ? "2.5px solid #6b4226" : "2.5px solid transparent", marginBottom: -2 }}>
            {t}{i === 2 && records.length > 0 ? ` (${records.length})` : ""}
          </button>
        ))}
      </div>

      <div style={{ padding: "16px 16px 80px" }}>
        {tab === 0 && <SalesTab onSave={addRecord} />}
        {tab === 1 && <StockTab onSave={addRecord} />}
        {tab === 2 && <HistoryTab records={records} onDelete={deleteRecord} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
